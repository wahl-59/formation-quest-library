id: quest.coder.make_dont_play_video_game_prototype.v1
title: Make, Don't Just Play - Tiny Video Game Prototype
archetype: Coder-Maker
theme: Skill, Vocation, and Gift
duration: 1 week
difficulty: 4
estimated_time: 300
source_module: Create Your Own Video Game
tags:
  - coding
  - design
  - logic
  - art
  - creativity

why_it_matters: >
  A student who makes games learns design, logic, story, and restraint.
  This quest turns passive entertainment into active craftsmanship.

instructions:
  - 'Choose a very simple game idea: maze, quiz, catcher, obstacle dodge, or text adventure.'
  - Write the goal of the game in one sentence.
  - Sketch the screen or interaction on paper before coding.
  - Build a tiny playable prototype using Scratch, Python, JavaScript, or another parent-approved tool.
  - Add one win condition and one lose or reset condition.
  - Ask one person to playtest it.
  - Write down one thing that confused the player and one thing you improved.

deliverables:
  - One-sentence game goal
  - Paper sketch
  - Playable prototype
  - Playtest note
  - One revision

evidence_required:
  - file_or_link
  - image
  - text
  - parent_observation

finished_means: >
  The student creates a tiny playable game prototype with a clear goal,
  one win condition, one reset or lose condition, and one improvement based on playtesting.

parent_notes: >
  Keep the scope tiny. The victory is finishing a small thing well,
  not dreaming about a massive game that never gets built.

safety_notes: >
  Use parent-approved coding tools. Do not publish online without parent permission.