id: quest.citizen_scholar.magna_carta_rights_and_duties.v1
title: Magna Carta - Rights and Duties
archetype: Citizen-Scholar
theme: Home, Place, and Service
duration: 1 week
difficulty: advanced
estimated_time: 180
source_module: Magna Carta
tags:
  - history
  - governance
  - rhetoric
  - writing
  - citizenship

why_it_matters: >
  A free people must understand both rights and duties.
  Studying Magna Carta helps the student see that law can restrain power and protect ordered liberty.

instructions:
  - Read a short parent-approved overview of Magna Carta.
  - Choose three clauses, ideas, or historical facts that seem important.
  - 'Create a two-column chart: "Rights Protected" and "Duties Required."'
  - 'Write one paragraph answering: Why is it dangerous when rulers are not under law?'
  - Discuss with a parent whether freedom means doing whatever one wants or living under just order.

deliverables:
  - Notes on three important ideas
  - Rights and duties chart
  - One-paragraph reflection
  - Parent discussion

evidence_required:
  - text
  - image_or_pdf
  - parent_observation

finished_means: >
  The student explains three important ideas from Magna Carta,
  completes a rights-and-duties chart, and discusses why lawful limits on power matter.

parent_notes: >
  This is a good bridge into rhetoric, constitutional history, justice, and Christian political thought.
  Keep the conversation concrete and avoid turning it into partisan politics.

safety_notes: >
  None.
