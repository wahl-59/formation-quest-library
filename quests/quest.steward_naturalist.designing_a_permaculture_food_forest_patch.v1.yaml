id: quest.steward_naturalist.designing_a_permaculture_food_forest_patch.v1
title: Designing a Permaculture Food Forest Patch
archetype: Steward-Naturalist
theme: Creation and Wonder
duration: 3 days
difficulty: Advanced
estimated_time: 180
tags:
  - ecology
  - land-management
  - botany
  - design
  - observation
why_it_matters: Understanding the complex relationships between soil, sunlight, water, and plant species is essential for effective land stewardship. This work cultivates the ability to observe natural patterns and apply them to create sustainable, productive systems, fostering a deeper connection to the environment and the responsibility of care.
instructions:
  - Survey the designated planting area to map existing sunlight patterns, soil moisture levels, and wind exposure.
  - Research the specific light, soil, and water requirements for the provided berry bushes and seedling trees.
  - Create a site plan sketch that identifies the optimal location for each plant, ensuring they have the necessary space and environmental conditions to thrive.
  - Draft a brief justification for each placement, explaining how the chosen spot supports the long-term health of the plant.
  - Prepare the ground for planting by clearing debris and ensuring the soil is ready for the new additions.
  - Plant the berry bushes and trees according to the developed site plan.
deliverables:
  - A hand-drawn site map showing the location of each new plant
  - A written justification for the placement of each species
  - Photographic evidence of the final planted specimens in their new locations
evidence_required:
  - image_or_pdf
  - text
finished_means: The Quest is finished when all plants are installed in their designated locations according to the site plan and the written justifications have been submitted for review.
parent_notes: Ensure the student has access to basic gardening tools, a measuring tape, and a compass or sun-tracking app if needed. It is helpful to provide a clear boundary for the planting area before the student begins their assessment.
safety_notes: Ensure the student is aware of proper tool handling, especially when using shovels or digging implements. Be mindful of potential underground utilities in the planting area before digging begins.
