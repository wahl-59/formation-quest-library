id: quest.aviator.aviation_control_surfaces_sketch.v1
title: Sketch an Aircraft and Explain Its Control Surfaces
archetype: Aviator
theme: Skill, Vocation, and Gift
duration: 1 week
difficulty: advanced
estimated_time: 180
source_module: Aviation
tags:
  - aviation
  - physics
  - drawing
  - communication
  - engineering

why_it_matters: >
  An aviator must learn to see a machine not as magic, but as ordered parts working together.
  Sketching and labeling an aircraft trains observation, technical understanding, and clear explanation.

instructions:
  - Choose one aircraft to study.
  - Make a careful sketch of the aircraft from side or top view.
  - Label the elevator, rudder, ailerons, wings, fuselage, landing gear, and propeller or engine location if visible.
  - Learn what each control surface does.
  - Write a plain-English explanation of how a pilot uses elevator, rudder, and ailerons.
  - Give a three-minute oral explanation to a parent.

deliverables:
  - Labeled aircraft sketch
  - Written explanation
  - Three-minute oral presentation

evidence_required:
  - image
  - text
  - audio_or_video_or_parent_observation

finished_means: >
  The student submits a labeled aircraft sketch and correctly explains the basic purpose
  of elevator, rudder, and ailerons to a parent.

parent_notes: >
  This pairs well with a museum visit, WACO Aviation Cadets, Civil Air Patrol, Young Eagles,
  or a model glider project.

safety_notes: >
  If visiting an airport or museum, follow all site rules and remain with a parent or approved adult.
