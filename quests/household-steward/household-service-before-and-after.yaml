id: quest.household_steward.household_service_before_and_after.v1
title: Household Service Before-and-After
archetype: Household Steward
theme: Home, Place, and Service
duration: 1 day
difficulty: Beginner
estimated_time: 90
tags:
  - home-place-and-service
  - household-steward
why_it_matters: Service becomes more meaningful when the student sees that work restores order. This quest trains attention, responsibility, and gratitude for the household.
instructions:
  - "Choose one small area that needs care: bookshelf, entryway, pantry shelf, mudroom, tool area, desk, piano area, or laundry space."
  - Take a “before” photo.
  - Clean, sort, repair, organize, or beautify the area.
  - Take an “after” photo.
  - Write 3–5 sentences explaining what changed and why it matters.
deliverables:
  - Before photo
  - After photo
  - Short written reflection
evidence_required:
  - image
  - text
finished_means: The student restores one small household area, submits before-and-after evidence, and explains how the work served the family.
parent_notes: This is a very good short-week quest because it produces visible fruit quickly. It also reinforces that household service is not an interruption to education; it is part of education.
safety_notes: Get permission to use cleaning products, tools, ladders, heavy objects, or fragile items.
