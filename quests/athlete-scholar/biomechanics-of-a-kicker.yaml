id: quest.athlete_scholar.biomechanics_of_a_kicker.v1
title: Biomechanics of a Kicker
archetype: Athlete-Scholar
theme: Courage and Self-Mastery
duration: 1 week
difficulty: 3
estimated_time: 180
tags:
  - biomechanics
  - athletics
  - physics
  - sports
why_it_matters: >
  To become more accurate and powerful by understanding how the body transfers force.
instructions:
  - Film 10 kicks from the side and 10 from behind.
  - Study one serious source on kicking mechanics or force transfer.
  - Create an annotated diagram of plant foot, hip rotation, contact point, and follow-through.
  - Write one paragraph explaining what you changed and why.
deliverables:
  - Baseline and final video
  - Annotated diagram
  - Written reflection
  - Demonstration to parent
evidence_required:
  - video
  - image_or_pdf
  - text
finished_means: >
  The student submits video, an annotated diagram, one explanatory paragraph,
  and demonstrates one improvement to the parent.
parent_notes: >
  Keep this focused on attention and improvement, not perfection.
safety_notes: >
  Warm up before kicking. Stop if there is pain.