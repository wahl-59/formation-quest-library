final_artifact: >
  A field station portfolio containing the field notebook, site map, equipment list, instrument protocols, selected raw and cleaned data, cross-section record, photo-point sequence, storm-event record, graphs, and final interpretation.

final_demonstration: >
  The student gives a 5-10 minute presentation called The Story of This Creek, explaining what was measured, what changed, what the student learned, what remains uncertain, and what should be watched next.

evidence_required:
  - project_notebook
  - site_map
  - field_photos
  - data_table
  - graph_or_dashboard
  - final_reflection
  - parent_observation

parent_review_rubric:
  complete:
    - The student kept a dated field notebook with repeated observations and enough detail for another person to understand the work.
    - The student collected rainfall and stream-stage observations by hand or instrument and validated readings when possible.
    - The student produced a site map, at least one cross-section record, and at least one storm-event interpretation.
    - The final presentation honestly distinguishes observation, interpretation, uncertainty, and speculation.
  needs_revision:
    - The student completed fieldwork but the records are incomplete, disorganized, or missing units, dates, times, or locations.
    - The student made graphs or conclusions but did not explain data gaps, uncertainty, or instrument limitations.
    - The final presentation needs clearer evidence or more careful interpretation.
  incomplete:
    - The student did not maintain a usable field notebook or collect repeated field observations.
    - The student relied mainly on research or screens rather than direct measurements of the creek and weather.
    - The final artifact does not show enough evidence to evaluate what was actually done.

portfolio_description: >
  I built and maintained a small field station at Wahlstead to observe rainfall, stream stage, channel form, and storm response. I kept a field notebook, took hand measurements, used available instruments, made graphs, and presented what the creek revealed during my period of record.

parent_notes: >
  The core Misogi should be possible with simple tools: notebook, rain gauge, staff gauge, tape, rod, camera, and spreadsheet. Pressure transducers, weather stations, groundwater loggers, citizen-science participation, dashboards, and professional outreach are valuable extensions but should not be required for families without the equipment, budget, or schedule.

safety_notes: >
  No student should work alone near water. No fieldwork should occur during lightning, high water, icy banks, darkness, or unsafe travel. Parents must approve installation methods, well locations, public data sharing, and any outreach to professionals or organizations.
