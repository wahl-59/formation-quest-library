id: misogi.wayfinder.hizer_trail_homeward_summons.v1
title: "The Hizer Trail: A Homeward Summons"
archetype: Wayfinder-Steward
theme: Home, Courage, and Memory
duration_weeks: 10
difficulty: Advanced
formation_goal: |
  The student will prepare for and complete a demanding self-powered journey inspired by a remembered ancestor, a real landscape, and the call to become capable, watchful, truthful, and useful. He will train in endurance, navigation, field readiness, food, first aid, water safety, historical memory, and wise judgment.
description: |
  This Misogi is a homeward summons. The beginning and ending points are defined by the parent and household, but the student must help determine the self-powered means of travel based on evidence gathered through preparation. The journey may involve walking, running, bicycling, paddling, or a parent-approved combination, but it must not rely on electric bikes or motorized travel as part of the challenge. Support vehicles, pickups, and parent oversight may be used for safety. The Misogi should culminate in a demanding overland passage and a supervised water challenge or symbolic crossing appropriate to age, skill, season, conditions, and parental judgment.
why_it_matters: |
  A young person should learn that courage is not rashness, strength is not cruelty, and adventure is not performance. This Misogi joins ancestry, place, practical skill, physical endurance, and mercy. The student learns to prepare carefully, move under his own power, honor those who came before him, understand the land more truthfully, protect the vulnerable, and return home with greater steadiness.
weekly_milestones:
  - week: 1
    title: Roots and Roads
    description: |
      Complete the Roots and Roads Quest. Identify one remembered person, a meaningful place, and a deed or episode that can serve as the historical and moral seed for the Misogi.
    finished_means: |
      The student submits the story brief, map with at least three marked places, and parent observation.
  - week: 2
    title: Know the Way
    description: |
      Complete the Know the Way Quest. Map the route between the beginning and ending points, identify waypoints, hazards, possible water and sleep options, and self-powered travel modes worth testing.
    finished_means: |
      The student submits the route map, waypoint list, and navigation note with hazards identified.
  - week: 3
    title: Know the Body
    description: |
      Complete the Know the Body Quest. Establish baseline capacity, practice breath and self-command, and record what kind of physical and mental training the final journey will require.
    finished_means: |
      The student submits the baseline log, breath practice note, and student reflection on training needs.
  - week: 4
    title: The Long Walk
    description: |
      Complete the Long Walk Quest. Test walking pace, kit, foot care, water needs, food, bailout thinking, and the ability to serve after fatigue.
    finished_means: |
      The student submits the walk plan, route record, and tired-service note.
  - week: 5
    title: The Long Ride
    description: |
      Complete the Long Ride Quest or an equivalent self-powered travel test approved by a parent. Test true pace, equipment readiness, repair skill, and whether cycling belongs in the final travel plan.
    finished_means: |
      The student submits the ride plan, repair demonstration, and revised travel estimate.
  - week: 6
    title: Fire, Food, and Field Kitchen
    description: |
      Complete the Fire, Food, and Field Kitchen Quest. Prepare outdoor food, plan durable travel meals, estimate water needs, and practice cleanup and service.
    finished_means: |
      The student submits the outdoor meal plan, no-cook meal plan, and food reflection.
  - week: 7
    title: First Aid, Weather, and Contingency
    description: |
      Complete the First Aid, Weather, and Contingency Quest. Build the first aid and emergency plan, identify weather hazards, set cancellation rules, and mark pickup or bailout points.
    finished_means: |
      The student submits the first aid inventory, contingency plan, and turn-back conditions.
  - week: 8
    title: Watercraft and Crossing Judgment
    description: |
      Complete the Watercraft and Crossing Judgment Quest. Practice water safety and paddling under qualified adult supervision, then create a crossing judgment checklist and safer alternate plan.
    finished_means: |
      The student submits water hazard notes, crossing judgment checklist, and parent observation.
  - week: 9
    title: Rehearsal Passage
    description: |
      Complete a half-scale or reduced-risk rehearsal using the likely mode or modes of travel. Carry realistic kit, use the food plan, follow check-ins, navigate intentionally, test pace, and revise the final proposal afterward.
    finished_means: |
      The student submits the rehearsal route log, revised final proposal, and student reflection.
  - week: 10
    title: Final Passage Home
    description: |
      Complete the parent-approved final passage under the student's own power, with adult supervision and support as needed. Present the final portfolio and complete Parent Review.
    finished_means: |
      The student submits the final route log, final artifact, and completed parent review.
linked_quest_ideas:
  - quest.memory.roots_and_roads.v1
  - quest.wayfinding.know_the_way.v1
  - quest.endurance.know_the_body.v1
  - quest.endurance.long_walk.v1
  - quest.cycling.long_ride.v1
  - quest.fieldcraft.fire_food_field_kitchen.v1
  - quest.preparedness.first_aid_weather_contingency.v1
  - quest.watercraft.crossing_judgment.v1
final_artifact: |
  The student will create a portfolio containing the Roots and Roads story brief, route map, waypoint list, training records, walk and ride logs, food plan, first aid and contingency plan, crossing judgment checklist, rehearsal revision, final route log, and a final reflection titled The Way Home.
final_demonstration: |
  The student will complete a parent-approved self-powered passage between the defined beginning and ending points. The student chooses proposed travel modes after testing them through the preparatory Quests. The final demonstration should include a meaningful overland portion and a supervised water challenge, paddle, or symbolic crossing suited to conditions. Parents may revise, shorten, relocate, postpone, or stop the final demonstration for safety.
evidence_required:
  - text
  - image
  - image_or_pdf
  - parent_observation
  - story_brief
  - route_map
  - waypoint_list
  - training_log
  - walk_log
  - ride_log
  - food_plan
  - first_aid_inventory
  - contingency_plan
  - crossing_judgment_checklist
  - rehearsal_route_log
  - final_route_log
  - final_reflection
parent_review_rubric:
  complete:
    - The student can narrate the remembered story, locate it within a real landscape, and speak truthfully about the people, conflicts, hardships, and responsibilities connected to that place.
    - The student completed the preparatory Quests carefully, revised assumptions when reality corrected him, and moved from vague confidence to practical readiness.
    - The student trained faithfully, learned realistic pace, managed food and water, and showed increasing steadiness under fatigue.
    - The student demonstrated appropriate skill in navigation, kit selection, repair, outdoor food, first aid awareness, weather judgment, contingency planning, and water safety.
    - The student respected limits, followed parent instructions, identified hazards, and understood that turning back or choosing a safer alternate can be wise and honorable.
    - The student showed that strength exists to serve, protect, carry, guide, feed, repair, and help others rather than to boast.
    - The final reflection shows gratitude, humility, courage, clearer self-knowledge, and a stronger sense of what it means to return home well.
  incomplete:
    - The student did not complete the preparatory Quests or parent-approved final passage.
    - Critical safety, first aid, weather, or water-judgment documentation is missing.
    - The student cannot narrate the remembered story, explain the route, or show evidence of faithful preparation.
  needs_revision:
    - The portfolio or preparatory work is useful but missing one or two required pieces.
    - The student completed the final passage but documentation, reflection, or route reasoning needs strengthening.
    - Safety, contingency, or crossing judgment records need clearer revision before the Misogi is complete.
parent_notes: |
  Parents define the beginning and ending points, approve the route, and retain authority over distance, travel modes, water activity, supervision, weather windows, sleep arrangements, emergency plans, and final completion. The student should make a formal final proposal after the preparatory Quests, but parent judgment governs approval. For the Hizer-inspired version, parents may connect the Misogi to southwestern Ohio, the Ohio River, frontier history, Shawnee presence, and family memory while avoiding simplistic or contemptuous history.
safety_notes: |
  This Misogi may involve road travel, trails, fatigue, weather exposure, water, paddling, and overnight logistics. Parents should scale all activities to the student's age, maturity, fitness, skill, and conditions. Do not attempt open-water swimming, river crossing, or hazardous paddling without proper training, flotation, qualified supervision, legal access, current and weather checks, and emergency planning. Support vehicles and alternate plans may be used for safety without undermining the student's self-powered challenge.
