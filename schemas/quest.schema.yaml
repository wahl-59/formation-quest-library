$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://example.com/schemas/quest.schema.yaml"
title: Quest
description: >
  A one-week formative challenge that produces visible evidence and can be reviewed by a parent.
type: object
additionalProperties: false

required:
  - id
  - title
  - archetype
  - theme
  - duration
  - difficulty
  - estimated_time
  - tags
  - why_it_matters
  - instructions
  - deliverables
  - evidence_required
  - finished_means

properties:
  id:
    type: string
    description: Stable unique identifier. Do not change once published.
    pattern: "^quest\\.[a-z0-9_]+\\.[a-z0-9_]+\\.v[0-9]+$"

  title:
    type: string
    minLength: 3

  archetype:
    type: string
    description: Formation archetype such as Aviator, Engineer, Protector-Medic, Communicator.

  theme:
    type: string
    description: Formation theme such as Courage and Self-Mastery, Creation and Wonder, Home, Place, and Service.

  duration:
    type: string
    description: Expected quest duration. Usually "1 week".

  difficulty:
    type: string
    description: Difficulty label. Legacy numeric values map as 1 = beginner, 2 = intermediate, 3 or higher = advanced.
    enum:
      - beginner
      - intermediate
      - advanced

  estimated_time:
    type: integer
    minimum: 1
    description: Estimated total minutes required. Store as a plain integer number of minutes.

  source_module:
    type: string

  source_modules:
    type: array
    items:
      type: string

  tags:
    type: array
    minItems: 1
    items:
      type: string

  why_it_matters:
    type: string
    minLength: 10

  instructions:
    type: array
    minItems: 1
    items:
      type: string

  deliverables:
    type: array
    minItems: 1
    items:
      type: string

  evidence_required:
    type: array
    minItems: 1
    items:
      type: string
      enum:
        - text
        - image
        - image_or_pdf
        - audio
        - video
        - audio_or_video
        - audio_or_video_or_parent_observation
        - file
        - file_or_link
        - link
        - parent_observation

  finished_means:
    type: string
    minLength: 10

  parent_notes:
    type: string

  safety_notes:
    type: string
